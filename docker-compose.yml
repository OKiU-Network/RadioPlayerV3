# RadioPlayerV3 — put `.env` in this same directory (next to this file), then: docker compose up -d --build
# `environment` below forces Compose to read those keys from the project `.env` for interpolation.
# Without this, some setups only saw empty vars from `env_file` alone.
services:
  radio:
    build: .
    container_name: radioplayerv3
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_ID: ${API_ID:?Add API_ID to .env in this directory (see .env.sample)}
      API_HASH: ${API_HASH:?Add API_HASH to .env}
      BOT_TOKEN: ${BOT_TOKEN:?Add BOT_TOKEN to .env}
      SESSION_STRING: ${SESSION_STRING:?Add SESSION_STRING to .env}
      CHAT_ID: ${CHAT_ID:?Add CHAT_ID to .env}
    volumes:
      - radio-downloads:/app/downloads
    # Optional: pin to one CPU / add limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "2"
    #       memory: 1G

volumes:
  radio-downloads:
